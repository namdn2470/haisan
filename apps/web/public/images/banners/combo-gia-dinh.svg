<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)" rx="12"/>
  <!-- Combo illustration -->
  <g transform="translate(320, 60)">
    <ellipse cx="120" cy="100" rx="100" ry="50" fill="#f5f5f4"/>
    <ellipse cx="118" cy="98" rx="92" ry="44" fill="white"/>
    <!-- Tôm -->
    <g transform="translate(30, 60)">
      <ellipse cx="25" cy="20" rx="20" ry="10" fill="#f97316" transform="rotate(-15, 25, 20)"/>
      <ellipse cx="50" cy="25" rx="18" ry="8" fill="#fb923c" transform="rotate(10, 50, 25)"/>
    </g>
    <!-- Cua -->
    <g transform="translate(100, 65)">
      <ellipse cx="25" cy="18" rx="22" ry="16" fill="#059669"/>
      <ellipse cx="23" cy="16" rx="18" ry="12" fill="#10b981"/>
    </g>
    <!-- Ốc -->
    <g transform="translate(170, 75)">
      <circle cx="15" cy="15" r="14" fill="#78350f"/>
      <circle cx="35" cy="18" r="12" fill="#92400e"/>
    </g>
    <!-- Ice -->
    <g fill="#e0f2fe" opacity="0.7">
      <rect x="80" y="95" width="15" height="12" rx="2"/>
      <rect x="140" y="100" width="14" height="10" rx="2"/>
    </g>
  </g>
  <!-- Text -->
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#dc2626">Combo</text>
  <text x="40" y="140" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f172a">Gia Đình</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Đủ loại hải sản tươi ngon</text>
  <!-- Badge -->
  <rect x="40" y="195" width="80" height="30" rx="15" fill="#dc2626"/>
  <text x="80" y="216" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">TIẾT KIỆM 20%</text>
</svg>
