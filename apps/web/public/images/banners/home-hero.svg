<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Wave pattern -->
  <path d="M0 300 Q100 250 200 280 Q300 310 400 270 Q500 230 600 260 Q700 290 800 250 L800 400 L0 400 Z" fill="url(#wave)"/>
  <path d="M0 320 Q100 280 200 300 Q300 320 400 290 Q500 260 600 290 Q700 320 800 280 L800 400 L0 400 Z" fill="#06b6d4" opacity="0.15"/>
  <!-- Tôm illustration -->
  <g transform="translate(480, 120)">
    <ellipse cx="80" cy="80" rx="60" ry="28" fill="#f97316" transform="rotate(-10, 80, 80)"/>
    <ellipse cx="68" cy="72" rx="48" ry="22" fill="#fb923c" transform="rotate(-10, 68, 72)"/>
    <path d="M140 85 Q165 60 160 85 Q155 110 140 85" fill="#ea580c"/>
  </g>
  <!-- Cua illustration -->
  <g transform="translate(560, 150)">
    <ellipse cx="60" cy="55" rx="55" ry="42" fill="#059669"/>
    <ellipse cx="58" cy="52" rx="48" ry="36" fill="#10b981"/>
  </g>
  <!-- Cá illustration -->
  <g transform="translate(400, 180)">
    <ellipse cx="70" cy="40" rx="55" ry="25" fill="#f43f5e"/>
    <ellipse cx="65" cy="38" rx="45" ry="20" fill="#fb7185"/>
  </g>
  <!-- Text -->
  <text x="80" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Hải Sản</text>
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#22d3ee">Biển Xanh</text>
  <text x="80" y="270" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">Tươi ngon mỗi ngày - Giao hàng trong ngày</text>
  <!-- CTA Button -->
  <rect x="80" y="300" width="160" height="50" rx="25" fill="#22d3ee"/>
  <text x="160" y="332" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">Mua Ngay</text>
</svg>
