<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)" rx="12"/>
  <!-- Cutting board -->
  <g transform="translate(280, 70)">
    <rect x="0" y="50" width="180" height="60" rx="6" fill="#a16207"/>
    <rect x="5" y="55" width="170" height="50" rx="5" fill="#ca8a04"/>
    <!-- Tôm đã lột -->
    <g transform="translate(20, 30)">
      <ellipse cx="25" cy="18" rx="22" ry="10" fill="#fb923c"/>
      <ellipse cx="23" cy="16" rx="17" ry="7" fill="#fdba74"/>
    </g>
    <!-- Cá đã cắt -->
    <g transform="translate(70, 35)">
      <rect x="0" y="5" width="50" height="25" rx="3" fill="#fda4af"/>
    </g>
    <!-- Mực đã làm sạch -->
    <g transform="translate(130, 40)">
      <ellipse cx="20" cy="18" rx="16" ry="25" fill="#a78bfa"/>
    </g>
  </g>
  <!-- Knife -->
  <g transform="translate(350, 85)">
    <path d="M60 20 L110 5 L115 12 L65 30 Z" fill="#6b7280"/>
    <rect x="50" y="22" width="35" height="10" rx="2" fill="#78350f"/>
  </g>
  <!-- Text -->
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#166534">Hải Sản</text>
  <text x="40" y="140" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f172a">Sơ Chế</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Tiện lợi - Nhanh chóng - Đã làm sạch</text>
  <!-- Badge -->
  <rect x="40" y="195" width="100" height="30" rx="15" fill="#166534"/>
  <text x="90" y="216" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">SẠCH - TIỆN LỢI</text>
</svg>
