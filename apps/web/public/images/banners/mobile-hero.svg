  <text x="40" y="165" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#22d3ee">Biển Xanh</text>
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Tươi ngon mỗi ngày</text>
  <!-- CTA -->
  <rect x="40" y="260" width="140" height="45" rx="22" fill="#22d3ee"/>
  <text x="110" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Mua Ngay</text>
</svg>
