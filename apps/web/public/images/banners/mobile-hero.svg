<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- Wave -->
  <path d="M0 350 Q100 320 200 340 Q300 360 400 330 L400 500 L0 500 Z" fill="#06b6d4" opacity="0.2"/>
  <!-- Tôm -->
  <g transform="translate(220, 180)">
    <ellipse cx="60" cy="60" rx="50" ry="24" fill="#f97316" transform="rotate(-10, 60, 60)"/>
    <ellipse cx="50" cy="53" rx="38" ry="18" fill="#fb923c" transform="rotate(-10, 50, 53)"/>
  </g>
  <!-- Text -->
