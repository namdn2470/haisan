<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Hải sản sơ chế illustration -->
  <g transform="translate(80, 60)">
    <!-- Cutting board -->
    <rect x="20" y="120" width="200" height="70" rx="8" fill="#a16207"/>
    <rect x="25" y="125" width="190" height="60" rx="6" fill="#ca8a04"/>
    <!-- Knife -->
    <path d="M200 100 L260 80 L265 90 L205 110" fill="#6b7280"/>
    <rect x="190" y="105" width="40" height="12" rx="2" fill="#78350f"/>
    <!-- Tôm đã lột vỏ -->
    <g transform="translate(40, 90)">
      <ellipse cx="30" cy="20" rx="28" ry="12" fill="#fb923c"/>
      <ellipse cx="28" cy="18" rx="22" ry="9" fill="#fdba74"/>
    </g>
    <!-- Cá đã cắt -->
    <g transform="translate(100, 95)">
      <rect x="0" y="5" width="60" height="30" rx="4" fill="#fda4af"/>
      <rect x="5" y="10" width="50" height="20" rx="3" fill="#fecdd3"/>
    </g>
    <!-- Mực đã làm sạch -->
    <g transform="translate(170, 100)">
      <ellipse cx="25" cy="20" rx="20" ry="30" fill="#a78bfa"/>
      <ellipse cx="23" cy="18" rx="15" ry="24" fill="#c4b5fd"/>
    </g>
  </g>
  <!-- Icon -->
  <g transform="translate(300, 200)">
    <circle cx="40" cy="40" r="38" fill="#166534"/>
    <text x="40" y="52" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">SC</text>
  </g>
</svg>
