<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Cá illustration -->
  <g transform="translate(60, 80)">
    <!-- Body -->
    <ellipse cx="130" cy="75" rx="95" ry="40" fill="#f43f5e"/>
    <ellipse cx="125" cy="72" rx="85" ry="34" fill="#fb7185"/>
    <ellipse cx="120" cy="70" rx="70" ry="26" fill="#fda4af"/>
    <!-- Dorsal fin -->
    <path d="M100 35 Q120 10 140 18 Q160 26 165 40" fill="#f43f5e"/>
    <!-- Tail fin -->
    <path d="M225 75 Q265 45 255 75 Q245 105 225 75" fill="#e11d48"/>
    <!-- Eye -->
    <circle cx="55" cy="68" r="10" fill="white"/>
    <circle cx="55" cy="68" r="6" fill="#1f2937"/>
    <circle cx="53" cy="66" r="2" fill="white"/>
    <!-- Scales hint -->
    <path d="M70 60 Q75 70 70 80" stroke="#e11d48" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M90 55 Q95 68 90 80" stroke="#e11d48" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M110 52 Q115 65 110 78" stroke="#e11d48" stroke-width="1" fill="none" opacity="0.3"/>
  </g>
  <!-- Icon -->
  <g transform="translate(300, 200)">
    <circle cx="40" cy="40" r="38" fill="#be123c"/>
    <text x="40" y="52" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">C</text>
  </g>
</svg>
