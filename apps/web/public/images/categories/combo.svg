<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Combo illustration -->
  <g transform="translate(70, 80)">
    <!-- Basket -->
    <rect x="20" y="80" width="200" height="70" rx="8" fill="#a16207"/>
    <rect x="25" y="85" width="190" height="60" rx="6" fill="#ca8a04"/>
    <!-- Tôm -->
    <g transform="translate(30, 70)">
      <ellipse cx="25" cy="25" rx="22" ry="10" fill="#f97316" transform="rotate(-15, 25, 25)"/>
      <ellipse cx="50" cy="30" rx="20" ry="9" fill="#fb923c" transform="rotate(10, 50, 30)"/>
    </g>
    <!-- Cua -->
    <g transform="translate(100, 75)">
      <ellipse cx="30" cy="22" rx="25" ry="18" fill="#059669"/>
      <ellipse cx="28" cy="20" rx="20" ry="14" fill="#10b981"/>
    </g>
    <!-- Ốc -->
    <g transform="translate(170, 80)">
      <circle cx="18" cy="18" r="15" fill="#78350f"/>
      <circle cx="35" cy="22" r="12" fill="#92400e"/>
    </g>
    <!-- Ice -->
    <g fill="#e0f2fe" opacity="0.6">
      <rect x="80" y="100" width="15" height="12" rx="2"/>
      <rect x="140" y="95" width="14" height="10" rx="2"/>
    </g>
  </g>
  <!-- Icon -->
  <g transform="translate(300, 200)">
    <circle cx="40" cy="40" r="38" fill="#b91c1c"/>
    <text x="40" y="52" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">CO</text>
  </g>
</svg>
