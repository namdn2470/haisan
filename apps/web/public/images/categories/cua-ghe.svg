<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Ghẹ xanh illustration -->
  <g transform="translate(100, 55)">
    <!-- Shell -->
    <ellipse cx="100" cy="95" rx="80" ry="60" fill="#059669"/>
    <ellipse cx="98" cy="90" rx="72" ry="52" fill="#10b981"/>
    <ellipse cx="96" cy="85" rx="62" ry="42" fill="#34d399"/>
    <!-- Shell ridges -->
    <path d="M50 80 Q100 55 150 80" stroke="#059669" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M48 95 Q100 70 152 95" stroke="#059669" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Eyes -->
    <ellipse cx="70" cy="40" rx="10" ry="14" fill="#059669"/>
    <ellipse cx="130" cy="40" rx="10" ry="14" fill="#059669"/>
    <circle cx="70" cy="38" r="4" fill="#1f2937"/>
    <circle cx="130" cy="38" r="4" fill="#1f2937"/>
    <!-- Claws -->
    <ellipse cx="25" cy="88" rx="26" ry="20" fill="#059669"/>
    <ellipse cx="175" cy="88" rx="26" ry="20" fill="#059669"/>
    <!-- Legs -->
    <path d="M42 135 Q32 165 28 190" stroke="#059669" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M65 140 Q55 170 52 195" stroke="#059669" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M135 140 Q145 170 148 195" stroke="#059669" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M158 135 Q168 165 172 190" stroke="#059669" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Icon -->
  <g transform="translate(300, 200)">
    <circle cx="40" cy="40" r="38" fill="#0369a1"/>
    <text x="40" y="52" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">C</text>
  </g>
</svg>
