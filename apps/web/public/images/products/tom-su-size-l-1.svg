<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Tôm sú - curved body segments -->
  <g filter="url(#shadow)" transform="translate(100, 60)">
    <!-- Tôm body - segmented -->
    <ellipse cx="100" cy="100" rx="70" ry="35" fill="#f97316" transform="rotate(-15, 100, 100)"/>
    <ellipse cx="85" cy="90" rx="60" ry="28" fill="#fb923c" transform="rotate(-15, 85, 90)"/>
    <ellipse cx="70" cy="82" rx="50" ry="22" fill="#fdba74" transform="rotate(-15, 70, 82)"/>
    <!-- Tail fan -->
    <path d="M170 110 Q195 85 190 105 Q185 125 170 110" fill="#ea580c"/>
    <path d="M175 115 Q200 95 195 120 Q190 140 175 115" fill="#dc2626"/>
    <!-- Antennae -->
    <path d="M30 75 Q10 40 25 20" stroke="#ea580c" stroke-width="2" fill="none"/>
    <path d="M35 80 Q15 50 30 30" stroke="#fb923c" stroke-width="1.5" fill="none"/>
    <!-- Legs -->
    <path d="M60 120 Q50 140 45 155" stroke="#f97316" stroke-width="2" fill="none"/>
    <path d="M80 125 Q70 145 65 160" stroke="#f97316" stroke-width="2" fill="none"/>
    <path d="M100 130 Q90 150 85 165" stroke="#fb923c" stroke-width="2" fill="none"/>
    <!-- Segments lines -->
    <path d="M45 75 Q50 95 45 115" stroke="#ea580c" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M70 70 Q75 90 70 110" stroke="#ea580c" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M95 68 Q100 88 95 108" stroke="#ea580c" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M120 72 Q125 92 120 112" stroke="#ea580c" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <!-- Price tag -->
  <rect x="20" y="230" width="120" height="50" rx="8" fill="#dc2626"/>
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Tôm Sú</text>
  <!-- Weight -->
  <text x="340" y="260" font-family="Arial, sans-serif" font-size="12" fill="#0369a1" text-anchor="middle">Size L</text>
</svg>
