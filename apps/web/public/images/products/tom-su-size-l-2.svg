<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Tôm thẻ - larger, wider body -->
  <g filter="url(#shadow)" transform="translate(80, 70)">
    <!-- Main body -->
    <ellipse cx="110" cy="90" rx="80" ry="40" fill="#f59e0b" transform="rotate(-10, 110, 90)"/>
    <ellipse cx="95" cy="82" rx="65" ry="32" fill="#fbbf24" transform="rotate(-10, 95, 82)"/>
    <ellipse cx="80" cy="75" rx="50" ry="25" fill="#fcd34d" transform="rotate(-10, 80, 75)"/>
    <!-- Head -->
    <ellipse cx="175" cy="95" rx="25" ry="20" fill="#d97706" transform="rotate(-10, 175, 95)"/>
    <!-- Tail -->
    <path d="M30 100 Q5 75 15 95 Q25 115 30 100" fill="#f59e0b"/>
    <path d="M35 105 Q15 85 25 100 Q35 120 35 105" fill="#d97706"/>
    <!-- Spots on body -->
    <circle cx="100" cy="80" r="4" fill="#d97706" opacity="0.6"/>
    <circle cx="120" cy="85" r="3" fill="#d97706" opacity="0.5"/>
    <circle cx="85" cy="75" r="3" fill="#d97706" opacity="0.5"/>
    <!-- Antennae -->
    <path d="M185 80 Q210 50 200 25" stroke="#d97706" stroke-width="2.5" fill="none"/>
    <path d="M190 85 Q215 60 205 35" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <!-- Legs -->
    <path d="M70 115 Q60 140 55 160" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
    <path d="M90 120 Q80 145 75 165" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
    <path d="M110 125 Q100 150 95 170" stroke="#fbbf24" stroke-width="2.5" fill="none"/>
  </g>
  <!-- Label -->
  <rect x="20" y="230" width="130" height="50" rx="8" fill="#d97706"/>
  <text x="85" y="260" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Tôm Thẻ</text>
  <text x="340" y="260" font-family="Arial, sans-serif" font-size="12" fill="#92400e" text-anchor="middle">Size L</text>
</svg>
