<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Mực lá - cuttlefish -->
  <g filter="url(#shadow)" transform="translate(100, 55)">
    <!-- Body - flattened mantle -->
    <ellipse cx="110" cy="85" rx="60" ry="95" fill="#b45309"/>
    <ellipse cx="108" cy="82" rx="54" ry="88" fill="#d97706"/>
    <ellipse cx="105" cy="78" rx="46" ry="75" fill="#f59e0b"/>
    <!-- Cuttlebone visible -->
    <ellipse cx="105" cy="85" rx="30" ry="60" fill="#fef3c7" opacity="0.3"/>
    <!-- Fins - wavy -->
    <path d="M55 35 Q25 60 35 95 Q45 130 55 100 Q60 70 55 35" fill="#b45309"/>
    <path d="M165 35 Q195 60 185 95 Q175 130 165 100 Q160 70 165 35" fill="#b45309"/>
    <!-- Tentacles -->
    <path d="M80 175 Q70 215 60 250" stroke="#b45309" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M95 180 Q90 225 80 260" stroke="#d97706" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M115 182 Q115 230 110 265" stroke="#b45309" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M135 180 Q140 225 145 260" stroke="#d97706" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M150 175 Q160 215 170 250" stroke="#b45309" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Tentacle hooks -->
    <g fill="#92400e">
      <path d="M60 248 Q58 255 62 252 Q66 255 64 248" />
      <path d="M80 258 Q78 265 82 262 Q86 265 84 258" />
      <path d="M110 263 Q108 270 112 267 Q116 270 114 263" />
      <path d="M143 258 Q141 265 145 262 Q149 265 147 258" />
      <path d="M168 248 Q166 255 170 252 Q174 255 172 248" />
    </g>
    <!-- Eyes -->
    <ellipse cx="82" cy="55" rx="13" ry="15" fill="white"/>
    <ellipse cx="82" cy="55" rx="9" ry="11" fill="#1c1917"/>
    <circle cx="80" cy="52" r="3" fill="white"/>
    <ellipse cx="128" cy="55" rx="13" ry="15" fill="white"/>
    <ellipse cx="128" cy="55" rx="9" ry="11" fill="#1c1917"/>
    <circle cx="126" cy="52" r="3" fill="white"/>
    <!-- W-shaped pupil -->
    <path d="M76 55 Q80 50 84 55 Q88 60 92 55" stroke="#fbbf24" stroke-width="2" fill="none"/>
    <path d="M122 55 Q126 50 130 55 Q134 60 138 55" stroke="#fbbf24" stroke-width="2" fill="none"/>
  </g>
  <!-- Label -->
  <rect x="20" y="240" width="100" height="45" rx="8" fill="#b45309"/>
  <text x="70" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Mực Lá</text>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="12" fill="#78350f" text-anchor="middle">Tươi</text>
</svg>
