<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#d8b4fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Mực ống - squid -->
  <g filter="url(#shadow)" transform="translate(100, 60)">
    <!-- Mantle -->
    <ellipse cx="100" cy="80" rx="55" ry="100" fill="#7c3aed"/>
    <ellipse cx="98" cy="78" rx="50" ry="92" fill="#8b5cf6"/>
    <ellipse cx="96" cy="75" rx="42" ry="80" fill="#a78bfa"/>
    <!-- Fins -->
    <path d="M55 30 Q30 50 40 80 Q50 110 55 80 Q60 50 55 30" fill="#7c3aed"/>
    <path d="M145 30 Q170 50 160 80 Q150 110 145 80 Q140 50 145 30" fill="#7c3aed"/>
    <!-- Tentacles -->
    <path d="M75 175 Q65 210 55 240" stroke="#7c3aed" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M90 180 Q85 220 75 255" stroke="#8b5cf6" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M105 182 Q105 225 100 260" stroke="#7c3aed" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M120 180 Q125 220 120 255" stroke="#8b5cf6" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M135 175 Q145 210 155 240" stroke="#7c3aed" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Suction cups pattern -->
    <g fill="#6d28d9" opacity="0.6">
      <circle cx="85" cy="120" r="3"/>
      <circle cx="100" cy="115" r="3"/>
      <circle cx="115" cy="120" r="3"/>
      <circle cx="90" cy="140" r="3"/>
      <circle cx="105" cy="135" r="3"/>
      <circle cx="120" cy="140" r="3"/>
    </g>
    <!-- Eye -->
    <ellipse cx="80" cy="55" rx="12" ry="14" fill="white"/>
    <ellipse cx="80" cy="55" rx="8" ry="10" fill="#1e1b4b"/>
    <ellipse cx="120" cy="55" rx="12" ry="14" fill="white"/>
    <ellipse cx="120" cy="55" rx="8" ry="10" fill="#1e1b4b"/>
    <circle cx="77" cy="52" r="3" fill="white"/>
    <circle cx="117" cy="52" r="3" fill="white"/>
  </g>
  <!-- Label -->
  <rect x="20" y="240" width="110" height="45" rx="8" fill="#6d28d9"/>
  <text x="75" y="270" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Mực Ống</text>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="12" fill="#5b21b6" text-anchor="middle">Size 20-30</text>
</svg>
