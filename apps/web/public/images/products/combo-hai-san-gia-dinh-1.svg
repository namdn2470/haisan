<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Combo seafood platter -->
  <g filter="url(#shadow)">
    <!-- Plate -->
    <ellipse cx="200" cy="160" rx="140" ry="70" fill="#f5f5f4"/>
    <ellipse cx="200" cy="158" rx="130" ry="62" fill="#fafaf9"/>
    <ellipse cx="200" cy="156" rx="118" ry="54" fill="white"/>
    <!-- Tôm on ice -->
    <g transform="translate(80, 90)">
      <ellipse cx="40" cy="50" rx="38" ry="18" fill="#f97316" transform="rotate(-15, 40, 50)"/>
      <ellipse cx="32" cy="42" rx="30" ry="14" fill="#fb923c" transform="rotate(-15, 32, 42)"/>
      <ellipse cx="55" cy="55" rx="35" ry="16" fill="#f97316" transform="rotate(10, 55, 55)"/>
      <ellipse cx="48" cy="48" rx="28" ry="12" fill="#fb923c" transform="rotate(10, 48, 48)"/>
    </g>
    <!-- Cua -->
    <g transform="translate(180, 95)">
      <ellipse cx="35" cy="30" rx="32" ry="24" fill="#059669"/>
      <ellipse cx="33" cy="28" rx="28" ry="20" fill="#10b981"/>
      <path d="M10 28 Q5 18 15 20" fill="#059669"/>
      <path d="M60 28 Q65 18 55 20" fill="#059669"/>
    </g>
    <!-- Ốc on plate -->
    <g transform="translate(280, 110)">
      <circle cx="20" cy="25" r="18" fill="#78350f"/>
      <circle cx="45" cy="30" r="16" fill="#92400e"/>
      <circle cx="30" cy="40" r="15" fill="#a16207"/>
    </g>
    <!-- Cá -->
    <g transform="translate(100, 140)">
      <ellipse cx="50" cy="25" rx="45" ry="18" fill="#f43f5e" transform="rotate(-5, 50, 25)"/>
      <ellipse cx="48" cy="23" rx="40" ry="14" fill="#fb7185" transform="rotate(-5, 48, 23)"/>
      <circle cx="20" cy="20" r="5" fill="white"/>
      <circle cx="20" cy="20" r="3" fill="#1f2937"/>
    </g>
    <!-- Ice cubes -->
    <g fill="#e0f2fe" opacity="0.7">
      <rect x="150" y="120" width="20" height="15" rx="3"/>
      <rect x="175" y="130" width="18" height="12" rx="3"/>
      <rect x="250" y="130" width="22" height="14" rx="3"/>
    </g>
  </g>
  <!-- Label -->
  <rect x="20" y="245" width="150" height="40" rx="8" fill="#dc2626"/>
  <text x="95" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Combo Hải Sản</text>
  <text x="340" y="272" font-family="Arial, sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">Gia Đình</text>
</svg>
