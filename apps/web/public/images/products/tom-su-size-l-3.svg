<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Tôm càng xanh - bright green -->
  <g filter="url(#shadow)" transform="translate(90, 65)">
    <!-- Body segments -->
    <ellipse cx="105" cy="95" rx="65" ry="35" fill="#22c55e" transform="rotate(-12, 105, 95)"/>
    <ellipse cx="90" cy="87" rx="52" ry="28" fill="#4ade80" transform="rotate(-12, 90, 87)"/>
    <ellipse cx="75" cy="80" rx="40" ry="22" fill="#86efac" transform="rotate(-12, 75, 80)"/>
    <!-- Head -->
    <ellipse cx="160" cy="100" rx="30" ry="22" fill="#16a34a" transform="rotate(-12, 160, 100)"/>
    <!-- Big claws -->
    <ellipse cx="185" cy="70" rx="25" ry="18" fill="#22c55e"/>
    <ellipse cx="190" cy="68" rx="20" ry="14" fill="#4ade80"/>
    <path d="M170 60 Q175 45 185 50 Q195 55 190 70" fill="#16a34a"/>
    <path d="M195 65 Q200 50 210 55 Q215 60 205 75" fill="#16a34a"/>
    <!-- Tail -->
    <path d="M40 105 Q15 80 25 100 Q35 120 40 105" fill="#22c55e"/>
    <!-- Antennae -->
    <path d="M175 75 Q200 40 195 15" stroke="#16a34a" stroke-width="2" fill="none"/>
    <path d="M180 80 Q205 45 200 20" stroke="#22c55e" stroke-width="1.5" fill="none"/>
    <!-- Legs -->
    <path d="M60 120 Q50 145 45 165" stroke="#22c55e" stroke-width="2" fill="none"/>
    <path d="M80 125 Q70 150 65 170" stroke="#22c55e" stroke-width="2" fill="none"/>
    <path d="M100 130 Q90 155 85 175" stroke="#4ade80" stroke-width="2" fill="none"/>
  </g>
  <!-- Label -->
  <rect x="20" y="230" width="140" height="50" rx="8" fill="#16a34a"/>
  <text x="90" y="260" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Tôm Càng Xanh</text>
  <text x="340" y="260" font-family="Arial, sans-serif" font-size="12" fill="#166534" text-anchor="middle">Tươi Sống</text>
</svg>
