<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Ghẹ lông - hairy crab -->
  <g filter="url(#shadow)" transform="translate(100, 50)">
    <!-- Shell -->
    <ellipse cx="100" cy="100" rx="82" ry="62" fill="#166534"/>
    <ellipse cx="100" cy="95" rx="75" ry="56" fill="#15803d"/>
    <ellipse cx="100" cy="90" rx="67" ry="48" fill="#22c55e"/>
    <!-- Hair texture -->
    <g stroke="#166534" stroke-width="1" fill="none" opacity="0.5">
      <line x1="50" y1="70" x2="45" y2="60"/>
      <line x1="60" y1="65" x2="55" y2="55"/>
      <line x1="75" y1="62" x2="72" y2="52"/>
      <line x1="90" y1="60" x2="88" y2="50"/>
      <line x1="110" y1="60" x2="112" y2="50"/>
      <line x1="125" y1="62" x2="128" y2="52"/>
      <line x1="140" y1="65" x2="145" y2="55"/>
      <line x1="150" y1="70" x2="155" y2="60"/>
    </g>
    <!-- Shell ridges -->
    <path d="M50 85 Q100 58 150 85" stroke="#14532d" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M48 100 Q100 73 152 100" stroke="#14532d" stroke-width="2" fill="none" opacity="0.3"/>
    <!-- Eyes -->
    <ellipse cx="68" cy="42" rx="11" ry="16" fill="#14532d"/>
    <ellipse cx="132" cy="42" rx="11" ry="16" fill="#14532d"/>
    <circle cx="68" cy="40" r="5" fill="#1f2937"/>
    <circle cx="132" cy="40" r="5" fill="#1f2937"/>
    <!-- Claws with hair -->
    <ellipse cx="26" cy="92" rx="26" ry="20" fill="#166534"/>
    <ellipse cx="30" cy="88" rx="20" ry="15" fill="#15803d"/>
    <path d="M10 72 Q15 52 30 58 Q45 64 40 78" fill="#14532d"/>
    <line x1="12" y1="68" x2="8" y2="55" stroke="#166534" stroke-width="1"/>
    <line x1="20" y1="65" x2="16" y2="52" stroke="#166534" stroke-width="1"/>
    <ellipse cx="174" cy="92" rx="26" ry="20" fill="#166534"/>
    <ellipse cx="170" cy="88" rx="20" ry="15" fill="#15803d"/>
    <path d="M190 72 Q185 52 170 58 Q155 64 160 78" fill="#14532d"/>
    <line x1="188" y1="68" x2="192" y2="55" stroke="#166534" stroke-width="1"/>
    <line x1="180" y1="65" x2="184" y2="52" stroke="#166534" stroke-width="1"/>
    <!-- Legs -->
    <path d="M40 138 Q30 168 26 192" stroke="#14532d" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M62 143 Q52 173 48 197" stroke="#14532d" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M138 143 Q148 173 152 197" stroke="#14532d" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M160 138 Q170 168 174 192" stroke="#14532d" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Label -->
  <rect x="20" y="235" width="120" height="45" rx="8" fill="#166534"/>
  <text x="80" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Ghẹ Lông</text>
  <text x="340" y="265" font-family="Arial, sans-serif" font-size="12" fill="#166534" text-anchor="middle">Size 3</text>
</svg>
