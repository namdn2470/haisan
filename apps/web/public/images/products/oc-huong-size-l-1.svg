<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Ốc hương - whelk snail -->
  <g filter="url(#shadow)" transform="translate(100, 40)">
    <!-- Shell spiral -->
    <circle cx="90" cy="90" r="55" fill="#78350f"/>
    <circle cx="90" cy="90" r="48" fill="#92400e"/>
    <circle cx="90" cy="90" r="40" fill="#a16207"/>
    <circle cx="90" cy="90" r="32" fill="#ca8a04"/>
    <!-- Spiral pattern -->
    <path d="M90 90 Q60 60 90 35 Q120 20 130 50 Q140 80 110 100" stroke="#78350f" stroke-width="3" fill="none" opacity="0.4"/>
    <path d="M90 90 Q65 68 90 48 Q115 35 122 60" stroke="#78350f" stroke-width="2" fill="none" opacity="0.3"/>
    <!-- Pointed tip -->
    <path d="M90 35 Q85 20 90 5" fill="#78350f"/>
    <!-- Body opening -->
    <ellipse cx="90" cy="150" rx="42" ry="22" fill="#78350f"/>
    <ellipse cx="88" cy="148" rx="38" ry="18" fill="#92400e"/>
    <!-- Operculum (trap door) -->
    <ellipse cx="88" cy="158" rx="15" ry="12" fill="#a16207"/>
    <ellipse cx="87" cy="157" rx="12" ry="9" fill="#ca8a04"/>
    <!-- Shell ridges -->
    <g stroke="#78350f" stroke-width="1" fill="none" opacity="0.3">
      <path d="M50 80 Q90 50 130 80"/>
      <path d="M45 100 Q90 65 135 100"/>
      <path d="M48 120 Q90 85 132 120"/>
    </g>
  </g>
  <!-- Label -->
  <rect x="20" y="240" width="100" height="45" rx="8" fill="#78350f"/>
  <text x="70" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Ốc Hương</text>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="12" fill="#78350f" text-anchor="middle">Size L</text>
</svg>
