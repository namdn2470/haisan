<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Cua biển - brown crab -->
  <g filter="url(#shadow)" transform="translate(100, 55)">
    <!-- Shell -->
    <ellipse cx="100" cy="95" rx="80" ry="60" fill="#92400e"/>
    <ellipse cx="100" cy="90" rx="72" ry="54" fill="#a16207"/>
    <ellipse cx="100" cy="85" rx="64" ry="46" fill="#ca8a04"/>
    <!-- Shell ridges -->
    <path d="M55 80 Q100 55 145 80" stroke="#78350f" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M50 95 Q100 70 150 95" stroke="#78350f" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Eyes -->
    <ellipse cx="70" cy="40" rx="10" ry="15" fill="#78350f"/>
    <ellipse cx="130" cy="40" rx="10" ry="15" fill="#78350f"/>
    <circle cx="70" cy="38" r="4" fill="#1f2937"/>
    <circle cx="130" cy="38" r="4" fill="#1f2937"/>
    <!-- Claws -->
    <ellipse cx="28" cy="90" rx="25" ry="20" fill="#92400e"/>
    <ellipse cx="32" cy="87" rx="20" ry="16" fill="#a16207"/>
    <path d="M12 72 Q18 52 32 58 Q46 64 42 78" fill="#78350f"/>
    <path d="M8 68 Q14 48 28 54 Q42 60 38 74" fill="#92400e"/>
    <ellipse cx="172" cy="90" rx="25" ry="20" fill="#92400e"/>
    <ellipse cx="168" cy="87" rx="20" ry="16" fill="#a16207"/>
    <path d="M188 72 Q182 52 168 58 Q154 64 158 78" fill="#78350f"/>
    <path d="M192 68 Q186 48 172 54 Q158 60 162 74" fill="#92400e"/>
    <!-- Legs -->
    <path d="M42 135 Q32 165 28 190" stroke="#78350f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M65 140 Q55 170 52 195" stroke="#78350f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M135 140 Q145 170 148 195" stroke="#78350f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M158 135 Q168 165 172 190" stroke="#78350f" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Label -->
  <rect x="20" y="235" width="110" height="45" rx="8" fill="#78350f"/>
  <text x="75" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Cua Biển</text>
  <text x="340" y="265" font-family="Arial, sans-serif" font-size="12" fill="#78350f" text-anchor="middle">Tươi Sống</text>
</svg>
