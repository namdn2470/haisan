<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Cá hồng biển - pink fish -->
  <g filter="url(#shadow)" transform="translate(60, 80)">
    <!-- Body -->
    <ellipse cx="130" cy="75" rx="100" ry="45" fill="#f43f5e"/>
    <ellipse cx="130" cy="72" rx="95" ry="40" fill="#fb7185"/>
    <ellipse cx="125" cy="70" rx="80" ry="32" fill="#fda4af"/>
    <!-- Scales pattern -->
    <g fill="none" stroke="#e11d48" stroke-width="1" opacity="0.3">
      <path d="M70 55 Q80 65 70 75"/>
      <path d="M90 50 Q100 60 90 70"/>
      <path d="M110 48 Q120 58 110 68"/>
      <path d="M130 47 Q140 57 130 67"/>
      <path d="M150 48 Q160 58 150 68"/>
      <path d="M170 50 Q180 60 170 70"/>
      <path d="M80 65 Q90 75 80 85"/>
      <path d="M100 62 Q110 72 100 82"/>
      <path d="M120 60 Q130 70 120 80"/>
      <path d="M140 60 Q150 70 140 80"/>
      <path d="M160 62 Q170 72 160 82"/>
      <path d="M180 65 Q190 75 180 85"/>
    </g>
    <!-- Dorsal fin -->
    <path d="M100 30 Q120 5 140 15 Q160 25 165 40" fill="#f43f5e"/>
    <path d="M105 35 Q125 12 142 22 Q158 32 162 42" fill="#fb7185"/>
    <!-- Tail fin -->
    <path d="M230 75 Q270 45 260 75 Q250 105 230 75" fill="#e11d48"/>
    <path d="M228 75 Q260 55 252 75 Q244 95 228 75" fill="#f43f5e"/>
    <!-- Eye -->
    <circle cx="55" cy="65" r="12" fill="white"/>
    <circle cx="55" cy="65" r="8" fill="#1f2937"/>
    <circle cx="52" cy="62" r="3" fill="white"/>
    <!-- Mouth -->
    <path d="M30 70 Q40 75 50 72" stroke="#be123c" stroke-width="2" fill="none"/>
    <!-- Gills -->
    <path d="M65 60 Q60 75 65 90" stroke="#e11d48" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Pectoral fin -->
    <path d="M90 95 Q100 115 85 120 Q70 115 90 95" fill="#fb7185"/>
  </g>
  <!-- Label -->
  <rect x="20" y="235" width="140" height="45" rx="8" fill="#be123c"/>
  <text x="90" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Cá Hồng Biển</text>
  <text x="340" y="265" font-family="Arial, sans-serif" font-size="12" fill="#9f1239" text-anchor="middle">Tươi Sống</text>
</svg>
