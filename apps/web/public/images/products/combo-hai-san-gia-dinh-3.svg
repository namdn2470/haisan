<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Hotpot Combo -->
  <g filter="url(#shadow)">
    <!-- Hotpot pot -->
    <ellipse cx="200" cy="160" rx="90" ry="50" fill="#dc2626"/>
    <ellipse cx="200" cy="155" rx="85" ry="45" fill="#ef4444"/>
    <ellipse cx="200" cy="150" rx="78" ry="38" fill="#f87171"/>
    <!-- Broth surface -->
    <ellipse cx="200" cy="148" rx="72" ry="32" fill="#fbbf24" opacity="0.8"/>
    <!-- Handles -->
    <rect x="95" y="145" width="25" height="10" rx="3" fill="#b91c1c"/>
    <rect x="280" y="145" width="25" height="10" rx="3" fill="#b91c1c"/>
    <!-- Steam -->
    <g stroke="#f3f4f6" stroke-width="2" fill="none" opacity="0.6">
      <path d="M170 115 Q175 95 170 75"/>
      <path d="M200 110 Q205 88 200 65"/>
      <path d="M230 115 Q235 95 230 78"/>
    </g>
    <!-- Ingredients in pot -->
    <!-- Tôm -->
    <g transform="translate(150, 130)">
      <ellipse cx="20" cy="18" rx="14" ry="8" fill="#f97316"/>
      <ellipse cx="18" cy="16" rx="11" ry="6" fill="#fb923c"/>
    </g>
    <g transform="translate(190, 138)">
      <ellipse cx="18" cy="15" rx="12" ry="7" fill="#f97316"/>
      <ellipse cx="16" cy="13" rx="9" ry="5" fill="#fb923c"/>
    </g>
    <!-- Cua -->
    <g transform="translate(230, 130)">
      <ellipse cx="18" cy="15" rx="16" ry="12" fill="#059669"/>
      <ellipse cx="16" cy="13" rx="13" ry="9" fill="#10b981"/>
    </g>
    <!-- Nấm -->
    <g fill="#e5e7eb">
      <ellipse cx="170" cy="145" rx="8" ry="5"/>
      <ellipse cx="210" cy="148" rx="7" ry="4"/>
      <ellipse cx="240" cy="142" rx="8" ry="5"/>
    </g>
    <!-- Rau -->
    <g fill="#22c55e">
      <path d="M165 140 Q170 135 175 140"/>
      <path d="M195 143 Q200 138 205 143"/>
      <path d="M220 140 Q225 135 230 140"/>
    </g>
  </g>
  <!-- Label -->
  <rect x="20" y="245" width="120" height="40" rx="8" fill="#dc2626"/>
  <text x="80" y="272" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Combo Lẩu</text>
  <text x="340" y="272" font-family="Arial, sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">Hải Sản</text>
</svg>
