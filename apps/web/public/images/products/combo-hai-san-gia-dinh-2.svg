<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- BBQ Seafood Combo -->
  <g filter="url(#shadow)">
    <!-- Bamboo basket -->
    <rect x="70" y="130" width="260" height="90" rx="10" fill="#a16207"/>
    <rect x="75" y="135" width="250" height="80" rx="8" fill="#ca8a04"/>
    <!-- Bamboo slats -->
    <g stroke="#a16207" stroke-width="2">
      <line x1="120" y1="135" x2="120" y2="215"/>
      <line x1="170" y1="135" x2="170" y2="215"/>
      <line x1="220" y1="135" x2="220" y2="215"/>
      <line x1="270" y1="135" x2="270" y2="215"/>
    </g>
    <!-- Grill plate in center -->
    <rect x="140" y="150" width="120" height="50" rx="5" fill="#374151"/>
    <rect x="145" y="155" width="110" height="40" rx="3" fill="#4b5563"/>
    <!-- Seafood on grill -->
    <!-- Tôm -->
    <g transform="translate(155, 145)">
      <ellipse cx="15" cy="20" rx="12" ry="8" fill="#f97316" transform="rotate(-20, 15, 20)"/>
      <ellipse cx="35" cy="22" rx="12" ry="8" fill="#f97316" transform="rotate(15, 35, 22)"/>
      <ellipse cx="25" cy="32" rx="12" ry="8" fill="#fb923c" transform="rotate(-10, 25, 32)"/>
    </g>
    <!-- Cua -->
    <g transform="translate(200, 155)">
      <ellipse cx="25" cy="20" rx="20" ry="15" fill="#059669"/>
      <ellipse cx="24" cy="18" rx="17" ry="12" fill="#10b981"/>
    </g>
    <!-- Ốc on side -->
    <g transform="translate(80, 160)">
      <circle cx="15" cy="15" r="12" fill="#78350f"/>
      <circle cx="35" cy="18" r="10" fill="#92400e"/>
      <circle cx="22" cy="32" r="11" fill="#a16207"/>
    </g>
    <!-- Mực -->
    <g transform="translate(280, 165)">
      <ellipse cx="20" cy="15" rx="15" ry="25" fill="#7c3aed"/>
      <ellipse cx="18" cy="13" rx="12" ry="20" fill="#8b5cf6"/>
    </g>
    <!-- Steam wisps -->
    <g stroke="#9ca3af" stroke-width="1.5" fill="none" opacity="0.5">
      <path d="M160 130 Q165 115 160 100"/>
      <path d="M200 125 Q205 108 200 95"/>
      <path d="M240 130 Q245 115 240 102"/>
    </g>
  </g>
  <!-- Label -->
  <rect x="20" y="240" width="130" height="45" rx="8" fill="#d97706"/>
  <text x="85" y="270" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Combo BBQ</text>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="12" fill="#92400e" text-anchor="middle">Hấp Nóng</text>
</svg>
