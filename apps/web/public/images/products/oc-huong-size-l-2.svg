<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Sò điệp - scallop -->
  <g filter="url(#shadow)" transform="translate(100, 55)">
    <!-- Top shell -->
    <path d="M100 25 Q180 25 180 100 Q180 170 100 170 Q20 170 20 100 Q20 25 100 25" fill="#0891b2"/>
    <path d="M100 30 Q175 30 175 100 Q175 165 100 165 Q25 165 25 100 Q25 30 100 30" fill="#06b6d4"/>
    <!-- Ribs -->
    <g stroke="#0891b2" stroke-width="2" fill="none">
      <line x1="100" y1="30" x2="100" y2="165"/>
      <line x1="30" y1="65" x2="170" y2="135"/>
      <line x1="35" y1="100" x2="165" y2="100"/>
      <line x1="170" y1="65" x2="30" y2="135"/>
      <line x1="45" y1="40" x2="155" y2="160"/>
      <line x1="155" y1="40" x2="45" y2="160"/>
    </g>
    <!-- Bottom shell (slightly visible) -->
    <ellipse cx="100" cy="175" rx="78" ry="18" fill="#0e7490"/>
    <!-- Hinge -->
    <ellipse cx="100" cy="30" rx="20" ry="8" fill="#0891b2"/>
    <!-- Adductor muscle scar -->
    <circle cx="100" cy="115" r="18" fill="#22d3ee" opacity="0.4"/>
    <circle cx="100" cy="115" r="12" fill="#67e8f9" opacity="0.3"/>
  </g>
  <!-- Label -->
  <rect x="20" y="240" width="100" height="45" rx="8" fill="#0891b2"/>
  <text x="70" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Sò Điệp</text>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="12" fill="#155e75" text-anchor="middle">Size L</text>
</svg>
