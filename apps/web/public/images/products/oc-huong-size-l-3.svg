<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#f5d0fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Hàu - oyster -->
  <g filter="url(#shadow)" transform="translate(100, 60)">
    <!-- Bottom shell (cup shape) -->
    <path d="M40 140 Q40 180 100 180 Q160 180 160 140 Q140 130 100 130 Q60 130 40 140" fill="#374151"/>
    <path d="M45 140 Q45 175 100 175 Q155 175 155 140 Q138 132 100 132 Q62 132 45 140" fill="#4b5563"/>
    <path d="M50 140 Q50 170 100 170 Q150 170 150 140 Q135 134 100 134 Q65 134 50 140" fill="#6b7280"/>
    <!-- Top shell (flat lid) -->
    <path d="M30 130 Q30 95 100 95 Q170 95 170 130 Q100 145 30 130" fill="#374151"/>
    <path d="M35 128 Q35 100 100 100 Q165 100 165 128 Q100 142 35 128" fill="#4b5563"/>
    <path d="M40 126 Q40 105 100 105 Q160 105 160 126 Q100 138 40 126" fill="#6b7280"/>
    <!-- Ribs on shell -->
    <g stroke="#374151" stroke-width="1.5" opacity="0.5">
      <path d="M55 135 Q100 120 145 135"/>
      <path d="M50 140 Q100 125 150 140"/>
      <path d="M50 145 Q100 132 150 145"/>
    </g>
    <!-- Pearl hint -->
    <ellipse cx="100" cy="155" rx="12" ry="10" fill="#e5e7eb" opacity="0.4"/>
    <ellipse cx="98" cy="153" rx="5" ry="4" fill="white" opacity="0.6"/>
  </g>
  <!-- Label -->
  <rect x="20" y="240" width="80" height="45" rx="8" fill="#374151"/>
  <text x="60" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Hàu</text>
  <text x="340" y="270" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Tươi</text>
</svg>
