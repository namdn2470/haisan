<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="50%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow-lg">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-md">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="200" fill="#38bdf8" opacity="0.06"/>
  <circle cx="150" cy="500" r="160" fill="#0ea5e9" opacity="0.05"/>
  <circle cx="400" cy="350" r="280" fill="#0284c7" opacity="0.03"/>

  <!-- Plate / platter -->
  <ellipse cx="400" cy="320" rx="260" ry="200" fill="url(#plate)" filter="url(#shadow-lg)"/>
  <ellipse cx="400" cy="320" rx="240" ry="185" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <ellipse cx="400" cy="320" rx="200" ry="150" fill="none" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="4 6"/>

  <!-- Shrimp (big, center-left) -->
  <g transform="translate(240, 230) rotate(-15)">
    <path d="M0,80 Q20,0 60,10 Q100,20 110,60 Q120,90 100,110 Q80,120 60,110 Q40,100 30,90 Z" fill="#f97316" opacity="0.9"/>
    <path d="M5,75 Q25,10 65,18 Q95,28 105,60" fill="none" stroke="#ea580c" stroke-width="2"/>
    <path d="M60,10 Q55,0 50,-15 Q48,-25 55,-30" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <path d="M65,12 Q62,2 57,-12 Q55,-22 62,-27" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="20" cy="55" r="3" fill="#1e293b"/>
  </g>

  <!-- Shrimp (smaller, top-right) -->
  <g transform="translate(420, 200) rotate(20)">
    <path d="M0,60 Q15,0 45,8 Q75,16 82,45 Q90,68 75,82 Q60,90 45,82 Q30,75 22,68 Z" fill="#fb923c" opacity="0.85"/>
    <path d="M4,56 Q19,8 49,14 Q71,22 78,45" fill="none" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="15" cy="40" r="2.5" fill="#1e293b"/>
  </g>

  <!-- Red crab (center) -->
  <g transform="translate(340, 280)">
    <ellipse cx="60" cy="50" rx="55" ry="35" fill="#dc2626" opacity="0.9"/>
    <ellipse cx="60" cy="50" rx="45" ry="28" fill="#ef4444" opacity="0.3"/>
    <!-- Claws -->
    <path d="M5,45 Q-15,30 -25,20 Q-30,15 -20,10 Q-10,8 -5,15 Q0,22 5,30" fill="#dc2626"/>
    <path d="M-25,20 Q-30,15 -20,10" fill="none" stroke="#b91c1c" stroke-width="1.5"/>
    <path d="M115,45 Q135,30 145,20 Q150,15 140,10 Q130,8 125,15 Q120,22 115,30" fill="#dc2626"/>
    <path d="M145,20 Q150,15 140,10" fill="none" stroke="#b91c1c" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="15" y1="75" x2="0" y2="100" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="78" x2="20" y2="105" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="90" y1="78" x2="100" y2="105" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="105" y1="75" x2="120" y2="100" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <line x1="42" y1="32" x2="38" y2="18" stroke="#dc2626" stroke-width="2"/>
    <circle cx="38" cy="16" r="3" fill="#1e293b"/>
    <line x1="78" y1="32" x2="82" y2="18" stroke="#dc2626" stroke-width="2"/>
    <circle cx="82" cy="16" r="3" fill="#1e293b"/>
  </g>

  <!-- Scallop shells (bottom-left) -->
  <g transform="translate(200, 370)">
    <path d="M0,40 Q20,-10 40,40" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <path d="M5,40 Q20,5 35,40" fill="#fde68a" opacity="0.5"/>
    <line x1="20" y1="5" x2="20" y2="38" stroke="#f59e0b" stroke-width="0.8" opacity="0.4"/>
    <line x1="12" y1="10" x2="10" y2="38" stroke="#f59e0b" stroke-width="0.6" opacity="0.3"/>
    <line x1="28" y1="10" x2="30" y2="38" stroke="#f59e0b" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Scallop shells (bottom-right) -->
  <g transform="translate(460, 380) scale(0.9)">
    <path d="M0,40 Q20,-10 40,40" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <path d="M5,40 Q20,5 35,40" fill="#fde68a" opacity="0.5"/>
    <line x1="20" y1="5" x2="20" y2="38" stroke="#f59e0b" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Lemon slices -->
  <g transform="translate(530, 310)">
    <circle cx="25" cy="25" r="25" fill="#fde047" opacity="0.85"/>
    <circle cx="25" cy="25" r="20" fill="#fef9c3" opacity="0.6"/>
    <circle cx="25" cy="25" r="4" fill="#facc15" opacity="0.8"/>
    <line x1="25" y1="5" x2="25" y2="45" stroke="#facc15" stroke-width="1" opacity="0.5"/>
    <line x1="5" y1="25" x2="45" y2="25" stroke="#facc15" stroke-width="1" opacity="0.5"/>
    <line x1="11" y1="11" x2="39" y2="39" stroke="#facc15" stroke-width="0.8" opacity="0.4"/>
    <line x1="39" y1="11" x2="11" y2="39" stroke="#facc15" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Small lemon -->
  <g transform="translate(180, 310) scale(0.7)">
    <circle cx="25" cy="25" r="25" fill="#fde047" opacity="0.75"/>
    <circle cx="25" cy="25" r="20" fill="#fef9c3" opacity="0.5"/>
    <circle cx="25" cy="25" r="4" fill="#facc15" opacity="0.7"/>
  </g>

  <!-- Green leaves / garnish -->
  <g transform="translate(450, 250)">
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#22c55e" opacity="0.7" transform="rotate(-30)"/>
    <ellipse cx="15" cy="-5" rx="16" ry="7" fill="#16a34a" opacity="0.6" transform="rotate(-10)"/>
    <ellipse cx="8" cy="5" rx="14" ry="6" fill="#22c55e" opacity="0.5" transform="rotate(15)"/>
  </g>

  <!-- More leaves -->
  <g transform="translate(220, 260)">
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="#22c55e" opacity="0.6" transform="rotate(-45)"/>
    <ellipse cx="12" cy="-3" rx="13" ry="5" fill="#16a34a" opacity="0.5" transform="rotate(-20)"/>
  </g>

  <!-- Ice cubes (subtle) -->
  <g opacity="0.25">
    <rect x="280" y="360" width="22" height="22" rx="5" fill="#e0f2fe" stroke="#bae6fd" stroke-width="1"/>
    <rect x="310" y="365" width="18" height="18" rx="4" fill="#e0f2fe" stroke="#bae6fd" stroke-width="0.8"/>
    <rect x="290" y="385" width="20" height="20" rx="5" fill="#e0f2fe" stroke="#bae6fd" stroke-width="0.8"/>
  </g>

  <!-- Subtle water droplets -->
  <circle cx="160" cy="200" r="3" fill="#bae6fd" opacity="0.4"/>
  <circle cx="580" cy="260" r="2.5" fill="#bae6fd" opacity="0.35"/>
  <circle cx="350" cy="180" r="2" fill="#bae6fd" opacity="0.3"/>
  <circle cx="520" cy="400" r="2" fill="#bae6fd" opacity="0.35"/>
</svg>
